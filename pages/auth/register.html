<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro | Store de x7sebaspanel</title>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body data-page="register">
  <main class="auth-wrapper">
    <section class="auth-card cyber-card">
      <p class="brand-mini">🚀 <span>x7sebaspanel</span></p>
      <h1>Crear Cuenta</h1>
      <p class="subtitle">Completa tus datos para registrarte</p>

      <form id="registerForm" class="form">
        <label for="fullName">NOMBRE COMPLETO</label>
        <input id="fullName" name="fullName" type="text" placeholder="Tu nombre" required />

        <label for="registerEmail">USUARIO</label>
        <input id="registerEmail" name="registerEmail" type="email" placeholder="usuario@correo.com" required />

        <label for="registerWhatsapp">WHATSAPP</label>
        <input id="registerWhatsapp" name="registerWhatsapp" type="tel" value="+52 962 140 6226" required />

        <label for="registerPassword">CONTRASEÑA</label>
        <input id="registerPassword" name="registerPassword" type="password" placeholder="Mínimo 6 caracteres" required />

        <label for="confirmRegisterPassword">CONFIRMAR CONTRASEÑA</label>
        <input id="confirmRegisterPassword" name="confirmRegisterPassword" type="password" placeholder="Repite contraseña" required />

        <button type="submit">📝 CREAR CUENTA</button>
      </form>

      <div class="auth-links">
        <a class="link" href="./login.html">Ya tengo cuenta, iniciar sesión</a>
        <a class="link" href="./recover.html">¿Olvidaste tu contraseña?</a>
      </div>
      <p id="registerMessage" class="message"></p>
    </section>
  </main>

  <!-- Firebase SDK (versión 9 compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  
  <!-- Configuración de Firebase -->
  <script src="../../js/firebase-config.js"></script>
  
  <!-- App principal -->
  <script src="../../js/app.js"></script>
</body>
</html>
