<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Rápido Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    h1 { font-size: 24px; margin-bottom: 30px; color: #0ff; }
    .btn {
      display: inline-block;
      padding: 20px 40px;
      margin: 10px;
      background: #0f0;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #0ff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
      transform: scale(1.05);
    }
    .info {
      margin: 20px 0;
      padding: 15px;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #0f0;
      border-radius: 5px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 ACCESO RÁPIDO ADMINISTRADOR</h1>
    
    <div class="info">
      <p>Haz clic en el botón para entrar como admin al dashboard y generar códigos</p>
    </div>

    <a href="pages/auth/admin-directo.html" class="btn">
      🔐 ENTRAR COMO ADMIN
    </a>

    <div class="info" style="margin-top: 30px; font-size: 12px; color: #888;">
      <p>Esto te configurará automáticamente como:</p>
      <p><strong style="color:#0f0;">admin@x7sebaspanel.com</strong></p>
    </div>
  </div>
</body>
</html>
