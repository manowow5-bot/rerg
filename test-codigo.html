<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test generación de códigos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #111;
      color: #fff;
    }
    .form { margin: 20px 0; }
    input, button {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }
    button { background: #0f0; color: #000; border: none; cursor: pointer; }
    .message { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .success { background: #0f0; color: #000; }
    .error { background: #f00; color: #fff; }
    #log { background: #222; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>🧪 Test de generación de códigos</h1>
  
  <div id="status" class="message">Cargando...</div>
  
  <h2>Generar código de prueba</h2>
  <form id="testForm" class="form">
    <label for="amount">Monto:</label>
    <input id="amount" type="number" min="1" value="100" required>
    <button type="submit">Generar código de prueba</button>
  </form>
  
  <div id="result" class="message" style="display:none;"></div>
  
  <h3>Log de eventos:</h3>
  <div id="log"></div>

  <script>
    // Función simple de log
    function log(msg, type = 'info') {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const color = type === 'error' ? '#f00' : type === 'success' ? '#0f0' : '#0ff';
      logDiv.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(msg);
    }

    // Test de generación de código
    function testCreateCode(amount) {
      log('Iniciando generación de código...', 'info');
      
      const generatedCode = "X7-" + Date.now().toString(36).toUpperCase() + "-" + Math.floor(100 + Math.random() * 900);
      const codeData = {
        code: generatedCode,
        amount: amount,
        createdBy: 'test@admin.com',
        createdAt: Date.now(),
        redeemed: false
      };

      log('Código generado: ' + generatedCode, 'success');
      
      // Guardar en localStorage
      try {
        const codes = JSON.parse(localStorage.getItem('x7_wallet_codes') || '[]');
        codes.unshift(codeData);
        localStorage.setItem('x7_wallet_codes', JSON.stringify(codes));
        log('Guardado en localStorage correctamente', 'success');
      } catch (e) {
        log('Error guardando: ' + e.message, 'error');
      }

      return codeData;
    }

    // Verificar estado inicial
    window.addEventListener('DOMContentLoaded', function() {
      log('Página cargada', 'success');
      
      // Verificar localStorage
      try {
        const codes = JSON.parse(localStorage.getItem('x7_wallet_codes') || '[]');
        log('Códigos existentes en localStorage: ' + codes.length, 'info');
        document.getElementById('status').textContent = '✅ Sistema listo';
        document.getElementById('status').className = 'message success';
      } catch (e) {
        log('Error leyendo localStorage: ' + e.message, 'error');
        document.getElementById('status').textContent = '❌ Error en sistema';
        document.getElementById('status').className = 'message error';
      }

      // Listener del formulario
      const form = document.getElementById('testForm');
      log('Formulario encontrado: ' + (form ? 'SI' : 'NO'), form ? 'success' : 'error');
      
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          log('Evento submit capturado', 'success');
          
          const amount = Number(document.getElementById('amount').value);
          log('Monto ingresado: $' + amount, 'info');
          
          const result = testCreateCode(amount);
          
          const resultDiv = document.getElementById('result');
          resultDiv.style.display = 'block';
          resultDiv.className = 'message success';
          resultDiv.innerHTML = `
            <strong>✅ Código generado:</strong><br>
            ${result.code}<br>
            <strong>Monto:</strong> $${result.amount}<br>
            <button onclick="navigator.clipboard.writeText('${result.code}')">Copiar código</button>
          `;
        });
        
        log('Event listener agregado al formulario', 'success');
      }
    });
  </script>
</body>
</html>
